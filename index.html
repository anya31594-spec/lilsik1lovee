<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>лилсик1лав ❤️</title>
    <!-- Підключаємо бібліотеку для красивого конфеті-салюту -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #ffe5ec;
            --heart-color: #ff477e;
            --envelope-color: #ff8fab;
            --envelope-dark: #fb6f92;
            --paper-color: #fffdf9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* АНІМАЦІЯ ПАДІННЯ СЕРДЕЧОК ТА КАРТИНКИ */
        .falling-item {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        .falling-heart {
            color: rgba(255, 71, 126, 0.45);
            font-size: 24px;
        }

        .falling-pic {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(255, 143, 171, 0.6);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @keyframes fall {
            0% {
                transform: translateY(-70px) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                /* Обертання туди-сюди приблизно на 300 градусів */
                transform: translateY(105vh) rotate(300deg);
                opacity: 0;
            }
        }

        /* ЕКРАН 1: КОТИКИ (З'ЯВЛЯЮТЬСЯ ПЕРШИМИ) */
        #cats-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        #cats-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .cats-title {
            color: #fb6f92;
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
            font-weight: bold;
        }

        .cats-container {
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Стиль котиків з вирізаним фоном (круглі на рожевому тлі) */
        .cat-avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff8fab;
            background-color: #ffe5ec;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 71, 126, 0.3);
            transition: transform 0.3s ease, opacity 0.5s ease;
            animation: wiggle 2s ease-in-out infinite alternate;
        }

        /* Кожен котик хитається з трохи різною швидкістю */
        .cat-avatar:nth-child(2) { animation-duration: 1.7s; }
        .cat-avatar:nth-child(3) { animation-duration: 2.3s; }

        .cat-avatar.fade-out {
            opacity: 0;
            transform: scale(0.2);
            pointer-events: none;
        }

        @keyframes wiggle {
            0% { transform: rotate(-10deg) scale(1); }
            100% { transform: rotate(10deg) scale(1.05); }
        }

        /* МУЗИЧНИЙ ПЛЕЄР ЗБОКУ */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background-image: url('https://i.pinimg.com/1200x/ee/49/cb/ee49cb9862d6741598eec67fa8202f60.jpg');
            background-size: cover;
            background-position: center;
            border: 3px solid #ff8fab;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 50;
            transition: transform 0.3s;
        }

        .music-player:hover {
            transform: scale(1.1);
        }

        .music-player.playing {
            animation: spin 5s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* ЕКРАН 2: КОНВЕРТ */
        #main-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 1s ease, transform 1s ease;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            z-index: 5;
        }

        #main-screen.visible {
            opacity: 1;
            transform: scale(1);
        }

        .hint {
            color: #fb6f92;
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Конверт */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: pointer;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .envelope-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 4;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--envelope-dark);
            transform-origin: top;
            transition: transform 0.4s ease 0.2s, z-index 0.2s ease 0.2s;
        }

        .envelope-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 150px solid var(--envelope-color);
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid #fa809e;
            z-index: 3;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        /* Лист */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 15px;
            width: 270px;
            height: 180px;
            background-color: var(--paper-color);
            border-radius: 8px;
            z-index: 2;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
            opacity: 0;
            transition: transform 0.5s ease, height 0.5s ease, z-index 0.1s ease 0.2s, opacity 0.3s ease;
        }

        /* СУРГУЧНА ПЕЧАТКА 22.02 */
        .wax-seal {
            position: absolute;
            top: 70px;
            left: 120px;
            width: 60px;
            height: 60px;
            background-color: #d84a75;
            border-radius: 50%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffe5ec;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 3px double #f18fa8;
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.4s ease;
        }

        .wax-seal:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .wax-seal.cracked {
            opacity: 0;
            transform: scale(1.5) rotate(-20deg);
            pointer-events: none;
        }

        /* Відкритий стан */
        .envelope-wrapper.open::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-130px);
            height: 380px;
            z-index: 5;
            opacity: 1;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 290px;
            left: 5px;
        }

        .letter-text {
            color: #4a4a4a;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-line;
            text-align: left;
            margin-bottom: 15px;
        }

        .letter-image {
            width: 100%;
            border-radius: 10px;
            border: 2px dashed var(--envelope-color);
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <!-- АУДІО-ТРЕК -->
    <audio id="bg-music" src="https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-dreamy-slow-texture-1165.mp3" loop></audio>

    <!-- ПЛЕЄР ЗБОКУ -->
    <div class="music-player" id="music-btn" onclick="toggleMusic()"></div>

    <!-- ЕКРАН 1: КОТИКИ -->
    <div id="cats-screen">
        <div class="cats-title">Нажми на каждого котика, чтобы убрать их... 🐾✨</div>
        <div class="cats-container">
            <img src="https://i.pinimg.com/736x/1d/ca/a2/1dcaa28d80f2084714feac839c580566.jpg" class="cat-avatar" onclick="popCat(this)">
            <img src="https://i.pinimg.com/736x/79/46/fc/7946fcd50621a9dbd7a62b8eaba2cc2f.jpg" class="cat-avatar" onclick="popCat(this)">
            <img src="https://i.pinimg.com/736x/0c/44/21/0c4421b25a76657eb090f1acf497445f.jpg" class="cat-avatar" onclick="popCat(this)">
        </div>
    </div>

    <!-- ЕКРАН 2: КОНВЕРТ -->
    <div id="main-screen">
        <div class="hint">Сломай печать, чтобы открыть конверт 💌</div>
        
        <div class="envelope-wrapper" id="envelope">
            <!-- Сургучна печатка -->
            <div class="wax-seal" id="seal" onclick="crackSeal(event)">22.02</div>
            
            <div class="letter" id="letter" onclick="event.stopPropagation();">
                <div class="letter-text">
                    БУЛОЧКАА БУЛОЧКА 😭😻 ТЫ МОЕ СОЛНЫШКО. я тебя люблю очень очень сильно!!! БЕЗУМНОООООО БЕЗУИГО ОЧЕНЬЬ СИЛЬНО СИЛЬНО ЛЮБЛЮ ТЫ КОТЕНОЧЕКУ, Я ЕК МОГУ ОПИСАТЬ СВОИ ЧУВСТВА😭😭 блина ну ты понимаешь же
                </div>
                
                <img class="letter-image" src="photo.jpg" alt="Наше фото" onerror="this.style.display='none';">
            </div>
        </div>
    </div>

    <script>
        // Твої картинки для фону
        const fallingImages = [
            'https://i.pinimg.com/736x/67/9a/f3/679af3934396a0f0f0a912a634945731.jpg',
            'https://i.pinimg.com/736x/7f/93/d7/7f93d78ae4ea9771e4d96120d13842f1.jpg',
            'https://i.pinimg.com/736x/8e/2c/47/8e2c4777398ebd31263d3f3a14545cb8.jpg',
            'https://i.pinimg.com/1200x/12/fe/f8/12fef8a212ee6669f28b33d0581b6b1b.jpg',
            'https://i.pinimg.com/1200x/ef/2f/eb/ef2febe2bf37c20f4b39b66b008f11e5.jpg'
        ];

        let catsCount = 3;

        // Клік на котика
        function popCat(element) {
            if (element.classList.contains('fade-out')) return;
            
            element.classList.add('fade-out');
            catsCount--;

            // Маленький сплеск конфеті при зникненні котика
            confetti({
                particleCount: 15,
                spread: 40,
                origin: { 
                    x: element.getBoundingClientRect().left / window.innerWidth, 
                    y: element.getBoundingClientRect().top / window.innerHeight 
                }
            });

            // Якщо зникли всі 3 котики
            if (catsCount === 0) {
                setTimeout(() => {
                    // Зникає екран з котиками
                    document.getElementById('cats-screen').classList.add('hidden');
                    
                    // Великий вибух конфеті-сердечок на весь екран
                    const duration = 2 * 1000;
                    const end = Date.now() + duration;

                    (function frame() {
                        confetti({
                            particleCount: 7,
                            angle: 60,
                            spread: 55,
                            origin: { x: 0 },
                            colors: ['#ff477e', '#ff8fab']
                        });
                        confetti({
                            particleCount: 7,
                            angle: 120,
                            spread: 55,
                            origin: { x: 1 },
                            colors: ['#ff477e', '#ff8fab']
                        });

                        if (Date.now() < end) {
                            requestAnimationFrame(frame);
                        }
                    }());

                    // Плавно показуємо конверт
                    setTimeout(() => {
                        document.getElementById('main-screen').classList.add('visible');
                        startFallingBackground(); // запускаємо постійне падіння картинок та сердечок
                    }, 800);

                }, 500);
            }
        }

        // Постійне падіння картинок і сердечок на фоні
        function startFallingBackground() {
            const body = document.querySelector('body');
            
            setInterval(() => {
                const item = document.createElement('div');
                item.classList.add('falling-item');

                // Випадково вибираємо: спавнити сердечко чи картинку
                if (Math.random() > 0.4) {
                    // Спавнимо сердечко
                    item.classList.add('falling-heart');
                    item.innerText = '❤️';
                } else {
                    // Спавнимо картинку
                    const img = document.createElement('img');
                    img.classList.add('falling-pic');
                    img.src = fallingImages[Math.floor(Math.random() * fallingImages.length)];
                    item.appendChild(img);
                }

                item.style.left = Math.random() * 100 + 'vw';
                item.style.animationDuration = Math.random() * 3 + 5 + 's'; // 5-8 секунд падіння
                
                body.appendChild(item);

                setTimeout(() => {
                    item.remove();
                }, 8000);
            }, 300); // Новий елемент кожні 0.3 секунди
        }

        // Звуковий супровід
        const audio = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');

        // Ми ставимо посилання на аудіозапис пісні Feist - My Moon My Man
        audio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"; // за замовчуванням приклад, ти можеш вставити сюди пряме mp3-посилання на пісню!

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                musicBtn.classList.add('playing');
            } else {
                audio.pause();
                musicBtn.classList.remove('playing');
            }
        }

        // Руйнування сургучної печатки
        function crackSeal(event) {
            event.stopPropagation(); // щоб не спрацював клік по конверту завчасно
            const seal = document.getElementById('seal');
            seal.classList.add('cracked');

            // Робимо ефект тріскання (дрібне конфеті)
            confetti({
                particleCount: 30,
                spread: 60,
                colors: ['#d84a75', '#f18fa8'],
                origin: { x: 0.5, y: 0.5 }
            });

            // Тепер конверт можна відкрити
            document.getElementById('envelope').setAttribute('onclick', 'toggleEnvelope()');
            
            // Змінюємо підказку зверху
            document.querySelector('.hint').innerText = "Нажми на конверт, чтобы достать письмо 💌";
        }

        function toggleEnvelope() {
            const envelope = document.getElementById('envelope');
            envelope.classList.toggle('open');
        }
    </script>
</body>
</html>
