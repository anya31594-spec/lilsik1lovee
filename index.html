<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do you love me? ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ПАДІННЯ СЕРДЕЧОК (активується після Yes) */
        .falling-heart {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            color: rgba(255, 71, 126, 0.6);
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* РЕТРО-ВІКНО */
        .window-box {
            background-color: #1a1a1a;
            border: 3px solid #ffffff;
            width: 90%;
            max-width: 360px;
            box-shadow: 8px 8px 0px #333333;
            z-index: 10;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Шапка вікна з трьома крапками */
        .window-header {
            border-bottom: 3px solid #ffffff;
            padding: 8px 12px;
            display: flex;
            gap: 6px;
            background-color: #262626;
        }

        .dot {
            width: 8px;
            height: 8px;
            border: 1.5px solid #ffffff;
            background-color: transparent;
        }

        /* Контент вікна */
        .window-content {
            padding: 30px 20px;
            text-align: center;
        }

        .question {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        /* КНОПКИ */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            height: 50px;
            position: relative;
        }

        .btn {
            background-color: #ffffff;
            color: #121212;
            border: 2px solid #ffffff;
            padding: 10px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            outline: none;
            height: 45px;
            min-width: 90px;
            transition: background-color 0.2s, color 0.2s;
        }

        .btn:active {
            background-color: #121212;
            color: #ffffff;
        }

        /* Кнопка No, яка буде стрибати */
        #no-btn {
            position: relative;
            z-index: 15;
        }

        /* КОНТЕЙНЕР ДЛЯ АНІМАЦІЇ СЕРЦЯ З ТЕКСТУ */
        #heart-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
        }

        .heart-text-particle {
            position: absolute;
            color: #ff477e;
            font-size: 10px;
            font-weight: bold;
            white-space: nowrap;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.5);
            animation: drawHeartParticle 0.5s forwards ease-out;
            text-shadow: 0 0 4px rgba(255, 71, 126, 0.8);
        }

        @keyframes drawHeartParticle {
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>

    <!-- Ретро-вікно -->
    <div class="window-box" id="main-window">
        <div class="window-header">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="window-content">
            <div class="question" id="text-display">Do you love me?</div>
            <div class="btn-container" id="buttons-area">
                <button class="btn" id="yes-btn" onclick="selectYes()">Yes</button>
                <button class="btn" id="no-btn" onclick="moveNoButton(this)">No</button>
            </div>
        </div>
    </div>

    <!-- Контейнер для малювання серця -->
    <div id="heart-container"></div>

    <script>
        // Функція для переміщення кнопки No при натисканні (підлаштовано під тачскріни)
        function moveNoButton(button) {
            // Переводимо кнопку в абсолютне позиціонування, якщо вона ще не там
            if (button.style.position !== 'fixed') {
                button.style.position = 'fixed';
            }

            // Враховуємо розміри екрану телефону та самої кнопки, щоб вона не вилітала за краї
            const padding = 30;
            const btnWidth = button.offsetWidth;
            const btnHeight = button.offsetHeight;

            const maxX = window.innerWidth - btnWidth - padding;
            const maxY = window.innerHeight - btnHeight - padding;

            // Генеруємо випадкові координати
            const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

            // Змінюємо положення кнопки
            button.style.left = randomX + 'px';
            button.style.top = randomY + 'px';
        }

        // Користувач натиснув YES
        function selectYes() {
            // 1. Змінюємо текст у віконці
            document.getElementById('text-display').innerText = "can't believe you clicked yes! I love ya to my lil' babe";
            
            // 2. Ховаємо кнопки
            document.getElementById('buttons-area').style.display = 'none';
            
            // 3. Запускаємо дощ із сердечок на фоні
            startFallingHearts();

            // 4. Запускаємо послідовну побудову серця з тексту
            setTimeout(animateTextHeart, 400);
        }

        // Фоновий дощ із сердечок
        function startFallingHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerText = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 2 + 3 + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }

        // Генерація та послідовна анімація серця з тексту "i love ya"
        function animateTextHeart() {
            const container = document.getElementById('heart-container');
            const totalParticles = 75; // Кількість текстових елементів у контурі
            const centerX = window.innerWidth / 2;
            
            // Підлаштовуємо висоту центру серця під екрани мобільних (трохи вище або нижче вікна)
            const centerY = window.innerHeight / 2; 
            
            // Розмір серця для мобільних пристроїв
            const scale = Math.min(window.innerWidth * 0.04, 13); 

            let i = 0;

            // Інтервал для створення послідовного ефекту «малювання» по лініях серця
            const drawingInterval = setInterval(() => {
                if (i >= totalParticles) {
                    clearInterval(drawingInterval);
                    return;
                }

                // Математична формула серця (параметричне рівняння)
                const t = (i / totalParticles) * 2 * Math.PI;
                
                // Рахуємо X та Y координати для кожної точки
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                const posX = centerX + x * scale;
                const posY = centerY + y * scale;

                // Створюємо елемент тексту
                const p = document.createElement('div');
                p.classList.add('heart-text-particle');
                p.innerText = 'i love ya';
                p.style.left = posX + 'px';
                p.style.top = posY + 'px';
                
                // Невеличкий випадковий поворот тексту для красивого хаотичного контуру
                p.style.transform = `translate(-50%, -50%) rotate(${Math.sin(t) * 15}deg)`;

                container.appendChild(p);
                i++;
            }, 40); // 40мс між появою кожної частинки створює ідеальний ефект малювання
        }
    </script>
</body>
</html>
