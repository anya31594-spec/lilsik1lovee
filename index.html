<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>лилсик1лав ❤️</title>
    <!-- Підключаємо бібліотеку для ефекту тріскання печатки -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #ffe5ec;
            --heart-color: #ff477e;
            --envelope-color: #ff8fab;
            --envelope-dark: #fb6f92;
            --paper-color: #fffdf9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* АНІМАЦІЯ ПАДІННЯ СЕРДЕЧОК НА ФОНІ */
        .falling-heart {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            color: rgba(255, 71, 126, 0.45);
            font-size: 24px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-70px) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ГОЛОВНИЙ КОНТЕЙНЕР */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            z-index: 5;
        }

        .hint {
            color: #fb6f92;
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: 500;
            text-align: center;
        }

        /* КОНВЕРТ */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: pointer;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .envelope-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 4;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--envelope-dark);
            transform-origin: top;
            transition: transform 0.4s ease 0.2s, z-index 0.2s ease 0.2s;
        }

        .envelope-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 150px solid var(--envelope-color);
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid #fa809e;
            z-index: 3;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        /* ЛИСТ ВСЕРЕДИНІ */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 15px;
            width: 270px;
            height: 180px;
            background-color: var(--paper-color);
            border-radius: 8px;
            z-index: 2;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
            opacity: 0;
            transition: transform 0.5s ease, height 0.5s ease, z-index 0.1s ease 0.2s, opacity 0.3s ease;
        }

        /* СУРГУЧНА ПЕЧАТКА 22.02 */
        .wax-seal {
            position: absolute;
            top: 70px;
            left: 120px;
            width: 60px;
            height: 60px;
            background-color: #d84a75;
            border-radius: 50%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffe5ec;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 3px double #f18fa8;
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.4s ease;
        }

        .wax-seal:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .wax-seal.cracked {
            opacity: 0;
            transform: scale(1.5) rotate(-20deg);
            pointer-events: none;
        }

        /* ВІДКРИТИЙ СТАН КОНВЕРТА */
        .envelope-wrapper.open::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-130px);
            height: 380px;
            z-index: 5;
            opacity: 1;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 290px;
            left: 5px;
        }

        .letter-text {
            color: #4a4a4a;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-line;
            text-align: left;
            margin-bottom: 15px;
        }

        .letter-image {
            width: 100%;
            border-radius: 10px;
            border: 2px dashed var(--envelope-color);
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hint">Сломай печать, чтобы открыть конверт 💌</div>
        
        <div class="envelope-wrapper" id="envelope">
            <!-- Сургучна печатка -->
            <div class="wax-seal" id="seal" onclick="crackSeal(event)">22.02</div>
            
            <!-- Лист -->
            <div class="letter" id="letter" onclick="event.stopPropagation();">
                <div class="letter-text">
                    БУЛОЧКАА БУЛОЧКА 😭😻 ТЫ МОЕ СОЛНЫШКО. я тебя люблю очень очень сильно!!! БЕЗУМНОООООО БЕЗУИГО ОЧЕНЬЬ СИЛЬНО СИЛЬНО ЛЮБЛЮ ТЫ КОТЕНОЧЕКУ, Я ЕК МОГУ ОПИСАТЬ СВОИ ЧУВСТВА😭😭 блина ну ты понимаешь же
                </div>
                
                <img class="letter-image" src="photo.jpg" alt="Наше фото" onerror="this.style.display='none';">
            </div>
        </div>
    </div>

    <script>
        // Запуск нескінченного падіння сердечок з самого початку
        function startFallingHearts() {
            const body = document.querySelector('body');
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerText = '❤️';

                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 3 + 4 + 's'; // падіння від 4 до 7 секунд
                heart.style.fontSize = Math.random() * 15 + 15 + 'px'; // випадковий розмір сердечок
                
                body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 7000);
            }, 300); // нове сердечко з'являється кожні 0.3 секунди
        }

        // Запускаємо дощ із сердечок відразу при завантаженні сторінки
        startFallingHearts();

        // Клік на сургучну печатку
        function crackSeal(event) {
            event.stopPropagation(); // запобігаємо передчасному відкриттю конверта
            const seal = document.getElementById('seal');
            seal.classList.add('cracked');

            // Гарний ефект розлітання дрібних частинок печатки
            confetti({
                particleCount: 35,
                spread: 60,
                colors: ['#d84a75', '#f18fa8'],
                origin: { x: 0.5, y: 0.5 }
            });

            // Тепер конверт активовано для відкриття
            document.getElementById('envelope').setAttribute('onclick', 'toggleEnvelope()');
            
            // Оновлюємо текст-підказку
            document.querySelector('.hint').innerText = "Нажми на конверт, чтобы достать письмо 💌";
        }

        // Відкриття/закриття конверта
        function toggleEnvelope() {
            const envelope = document.getElementById('envelope');
            envelope.classList.toggle('open');
        }
    </script>
</body>
</html>
