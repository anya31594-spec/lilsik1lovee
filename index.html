<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>лилсик1лав ❤️</title>
    <style>
        :root {
            --bg-color: #ffe5ec;
            --heart-color: #ff477e;
            --envelope-color: #ff8fab;
            --envelope-dark: #fb6f92;
            --paper-color: #fffdf9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Анімація падаючих сердечок на фоні */
        .falling-heart {
            position: absolute;
            color: rgba(255, 71, 126, 0.4);
            font-size: 20px;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Екран 1: Інтро (Кнопка-Серце) */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.6s ease, visibility 0.6s;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
        }

        #intro-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .intro-title {
            color: #fb6f92;
            font-size: 2rem;
            margin-bottom: 40px;
            animation: pulseText 2s infinite alternate;
            padding: 0 20px;
            text-align: center;
        }

        .big-heart {
            background-color: var(--heart-color);
            display: inline-block;
            height: 100px;
            position: relative;
            transform: rotate(-45deg);
            width: 100px;
            cursor: pointer;
            animation: beat 1.2s infinite;
            box-shadow: 0 10px 30px rgba(255, 71, 126, 0.5);
        }

        .big-heart:before,
        .big-heart:after {
            content: "";
            background-color: var(--heart-color);
            border-radius: 50%;
            position: absolute;
            width: 100px;
            height: 100px;
        }

        .big-heart:before { top: -50px; left: 0; }
        .big-heart:after { top: 0; left: 50px; }

        .click-me {
            position: absolute;
            transform: rotate(45deg);
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            width: 100%;
            text-align: center;
            top: 35px;
            left: 0;
            z-index: 2;
        }

        /* Екран 2: Конверт та Лист */
        #main-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.8s ease, transform 0.8s ease;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            z-index: 5;
        }

        #main-screen.visible {
            opacity: 1;
            transform: scale(1);
        }

        .hint {
            color: #fb6f92;
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Конверт */
        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: pointer;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            transition: transform 0.3s ease;
        }

        /* Верхній клапан конверта */
        .envelope-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 4;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--envelope-dark);
            transform-origin: top;
            transition: transform 0.4s ease 0.2s, z-index 0.2s ease 0.2s;
        }

        /* Передній закриваючий трикутник (щоб повністю ховати лист!) */
        .envelope-wrapper::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 150px solid var(--envelope-color);
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid #fa809e;
            z-index: 3;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        /* Лист усередині */
        .letter {
            position: absolute;
            bottom: 5px;
            left: 15px;
            width: 270px;
            height: 180px;
            background-color: var(--paper-color);
            border-radius: 8px;
            z-index: 2;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
            opacity: 0; /* Сховано за замовчуванням */
            transition: transform 0.5s ease, height 0.5s ease, z-index 0.1s ease 0.2s, opacity 0.3s ease;
        }

        /* Сердечко-замок на конверті */
        .heart-lock {
            position: absolute;
            top: 85px;
            left: 138px;
            width: 24px;
            height: 24px;
            background-color: var(--heart-color);
            transform: rotate(-45deg);
            z-index: 5;
            transition: transform 0.4s ease, opacity 0.3s ease;
        }
        .heart-lock::before, .heart-lock::after {
            content: "";
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: var(--heart-color);
            border-radius: 50%;
        }
        .heart-lock::before { top: -12px; left: 0; }
        .heart-lock::after { top: 0; left: 12px; }

        /* ВІДКРИТИЙ СТАН */
        .envelope-wrapper.open::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-wrapper.open .heart-lock {
            transform: rotate(-45deg) scale(0);
            opacity: 0;
        }

        .envelope-wrapper.open .letter {
            transform: translateY(-130px);
            height: 380px;
            z-index: 5;
            opacity: 1; /* Стає видимим при відкритті */
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 290px;
            left: 5px;
        }

        /* Текст листа */
        .letter-text {
            color: #4a4a4a;
            font-size: 0.95rem;
            line-height: 1.5;
            white-space: pre-line;
            text-align: left;
            margin-bottom: 15px;
        }

        /* Зображення */
        .letter-image {
            width: 100%;
            border-radius: 10px;
            border: 2px dashed var(--envelope-color);
            margin-top: 10px;
            display: block;
        }

        /* Анімації */
        @keyframes beat {
            0% { transform: scale(1) rotate(-45deg); }
            50% { transform: scale(1.1) rotate(-45deg); }
            100% { transform: scale(1) rotate(-45deg); }
        }

        @keyframes pulseText {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1 class="intro-title">Тебе пришло особенное сообщение! ✨</h1>
        <div class="big-heart" onclick="startExperience()">
            <span class="click-me">Открыть</span>
        </div>
    </div>

    <div id="main-screen">
        <div class="hint">Нажми на конверт, чтобы достать письмо 💌</div>
        
        <div class="envelope-wrapper" id="envelope" onclick="toggleEnvelope()">
            <div class="heart-lock"></div>
            
            <div class="letter" id="letter" onclick="event.stopPropagation();">
                <div class="letter-text">
                    БУЛОЧКАА БУЛОЧКА 😭😻 ТЫ МОЕ СОЛНЫШКО. я тебя люблю очень очень сильно!!! БЕЗУМНОООООО БЕЗУИГО ОЧЕНЬЬ СИЛЬНО СИЛЬНО ЛЮБЛЮ ТЫ КОТЕНОЧЕКУ, Я ЕК МОГУ ОПИСАТЬ СВОИ ЧУВСТВА😭😭 блина ну ты понимаешь же
                </div>
                
                <img class="letter-image" src="photo.jpg" alt="Наше фото" onerror="this.style.display='none';">
            </div>
        </div>
    </div>

    <script>
        // Створення ефекту падаючих сердечок
        function createFallingHearts() {
            const symbols = ['❤️', '💖', '💕', '✨', '🌸'];
            const body = document.querySelector('body');
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('falling-heart');
                heart.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                
                // Випадкова позиція по горизонталі та швидкість падіння
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 3 + 4 + 's'; // 4-7 секунд
                heart.style.fontSize = Math.random() * 15 + 15 + 'px'; // Розмір 15-30px
                
                body.appendChild(heart);
                
                // Видаляємо сердечко після завершення анімації
                setTimeout(() => {
                    heart.remove();
                }, 7000);
            }, 400); // Нове сердечко кожні 0.4 сек
        }

        // Перехід від інтро до конверта
        function startExperience() {
            const intro = document.getElementById('intro-screen');
            const main = document.getElementById('main-screen');
            
            intro.classList.add('hidden');
            
            setTimeout(() => {
                main.classList.add('visible');
                createFallingHearts(); // запускаємо сердечка на фоні
            }, 400);
        }

        // Відкриття/Закриття конверта
        function toggleEnvelope() {
            const envelope = document.getElementById('envelope');
            envelope.classList.toggle('open');
        }
    </script>
</body>
</html>
